name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: cd functions && npm ci

      - name: Set SMTP credentials
        run: |
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> $GITHUB_ENV
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> $GITHUB_ENV
        shell: bash

      - name: Set Firebase secrets
        run: |
          cd functions
          echo -n "${{ secrets.SMTP_USER }}" | firebase functions:secrets:set SMTP_USER --data-file=- --project=${{ secrets.FIREBASE_PROJECT_ID }}
          echo -n "${{ secrets.SMTP_PASSWORD }}" | firebase functions:secrets:set SMTP_PASSWORD --data-file=- --project=${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Build
        run: cd functions && npm run build

      - name: Deploy to Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEAT_AND_POTATOES_86149 }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          version: '>=418.0.0'

      - name: Deploy functions
        run: firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }}
