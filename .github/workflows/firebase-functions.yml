name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: cd functions && npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEAT_AND_POTATOES_86149 }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          version: '>=418.0.0'

      - name: Set environment variables
        run: |
          firebase functions:config:set smtp.user="${{ secrets.SMTP_USER }}" smtp.pass="${{ secrets.SMTP_PASSWORD }}" --project ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Build
        run: cd functions && npm run build

      - name: Deploy functions
        run: firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }}
